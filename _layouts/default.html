<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Mon Wiki</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
</head>
<body>
    <div class="main-wrapper">
        <!-- Sidebar avec Navigation et Recherche -->
        <aside class="sidebar">
            <div class="sidebar-content">
                <div class="logo">
                    <h1>📚</h1>
                    <h2>Mon Wiki</h2>
                </div>

                <!-- Barre de Recherche -->
                <div class="search-section">
                    <input type="text" id="searchInput" placeholder="Rechercher..." class="search-box">
                    <div id="searchResults" class="search-results"></div>
                </div>

                <!-- Navigation -->
                <nav class="nav-menu">
                    <a href="/docs/" class="nav-link {% if page.url == '/docs/' %}active{% endif %}">🏠 Accueil</a>
                    <a href="/docs/recettes/" class="nav-link {% if page.url contains 'recettes' %}active{% endif %}">🍳 Recettes</a>
                    <a href="/docs/guides/" class="nav-link {% if page.url contains 'guides' %}active{% endif %}">📖 Guides</a>
                    <a href="/docs/references/" class="nav-link {% if page.url contains 'references' %}active{% endif %}">📚 Références</a>
                </nav>


            </div>
        </aside>

        <!-- Contenu Principal -->
        <main class="main-content">
            <article class="content">
                {{ content }}
            </article>
            
            <footer class="footer">
                <p>Créé avec ❤️ GitHub Pages & Jekyll | {{ site.time | date: "%d/%m/%Y" }}</p>
            </footer>
        </main>
    </div>
    <script>
      window.siteBaseUrl = "{{ site.baseurl }}";
    </script>
    <script src="{{ site.baseurl }}/assets/js/search.js"></script>
</body>
</html>
